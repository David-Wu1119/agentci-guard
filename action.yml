name: AgentCI Guard
description: Scan GitHub Actions workflows for unsafe AI coding-agent usage.
author: David Wu
branding:
  icon: shield
  color: red
inputs:
  path:
    description: Repository path to scan.
    required: false
    default: "."
  sarif:
    description: SARIF output path.
    required: false
    default: "agentci-results.sarif"
  fail-on:
    description: Minimum severity that fails the action. One of none, low, medium, high, critical.
    required: false
    default: "high"
outputs:
  findings:
    description: Total number of findings.
  critical:
    description: Number of critical-severity findings.
  high:
    description: Number of high-severity findings.
  medium:
    description: Number of medium-severity findings.
  low:
    description: Number of low-severity findings.
  sarif-path:
    description: Path to the written SARIF file.
  diagnostics:
    description: Number of parse or incomplete-analysis diagnostics.
  analysis-complete:
    description: Whether the scanner closed its static-analysis boundary.
runs:
  using: node24
  main: dist/action.js
