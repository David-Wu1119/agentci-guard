# This file is managed by Lisa.
# Do not edit directly — changes will be overwritten on the next `lisa` run.

name: Claude Nightly Jira Triage (Reusable)

on:
  workflow_call:
    inputs:
      ticket_count:
        description: 'Number of untriaged tickets to process'
        required: false
        default: 5
        type: number
      ticket_key:
        description: 'Specific Jira ticket key to triage (overrides ticket_count)'
        required: false
        default: ''
        type: string
      ticket_status:
        description: 'Jira status to filter for (e.g. "To Do", "Open", "Backlog")'
        required: false
        default: 'To Do'
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      JIRA_API_TOKEN:
        required: false

jobs:
  check_claude_setup:
    name: 🔑 Check Claude Setup
    runs-on: ubuntu-latest
    outputs:
      has_claude_token: ${{ steps.check.outputs.has_claude_token }}
    steps:
      - name: Check for CLAUDE_CODE_OAUTH_TOKEN
        id: check
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "has_claude_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_claude_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not set - Claude automation will be skipped. Provision the secret to enable it."
          fi

  triage:
    needs: [check_claude_setup]
    if: |
      needs.check_claude_setup.outputs.has_claude_token == 'true' &&
      (vars.JIRA_BASE_URL != '' && vars.JIRA_USER_EMAIL != '' && vars.JIRA_PROJECT_KEY != '')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Read plugins from project settings
        id: plugins
        run: |
          if [ -f .claude/settings.json ]; then
            MARKETPLACES=$(jq -r '(.extraKnownMarketplaces // {}) | to_entries[] | .value.source | if .source == "github" then "https://github.com/\(.repo).git" else empty end' .claude/settings.json 2>/dev/null || echo "")
            MARKETPLACE_NAMES=$(jq -r '(.extraKnownMarketplaces // {}) | to_entries[] | .value.source.repo // .key | split("/") | last' .claude/settings.json 2>/dev/null || echo "")
            PLUGINS=$(jq -r '(.enabledPlugins // {}) | to_entries[] | select(.value == true) | .key' .claude/settings.json 2>/dev/null | while IFS= read -r plugin; do
              mk="${plugin##*@}"
              if echo "$MARKETPLACE_NAMES" | grep -qx "$mk"; then
                echo "$plugin"
              fi
            done)
          else
            MARKETPLACES=""
            PLUGINS=""
          fi
          {
            echo "marketplaces<<PLUGINS_EOF"
            echo "$MARKETPLACES"
            echo "PLUGINS_EOF"
            echo "plugins<<PLUGINS_EOF"
            echo "$PLUGINS"
            echo "PLUGINS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Calculate max turns
        id: config
        run: echo "max_turns=$(( ${{ inputs.ticket_count }} * 40 ))" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code to triage Jira tickets
        uses: anthropics/claude-code-action@v1
        with:
          plugin_marketplaces: ${{ steps.plugins.outputs.marketplaces }}
          plugins: ${{ steps.plugins.outputs.plugins }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            You are a Jira ticket triage agent. Your job is to find untriaged tickets, fetch their details, run the ticket-triage skill for analytical analysis, and post findings back to Jira.

            IMPORTANT: Use the Jira REST API **v3** via curl with Basic auth for all Jira interactions:
              curl -s -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" -H "Content-Type: application/json" "$JIRA_BASE_URL/rest/api/3/..."

            The v2 search endpoint has been removed. Always use v3 endpoints.

            ## Jira API v3 reference

            ### Search for issues
            Use the v3 search/jql endpoint with --get and --data-urlencode:
              curl -s -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
                -H "Content-Type: application/json" \
                "$JIRA_BASE_URL/rest/api/3/search/jql" \
                --get \
                --data-urlencode 'jql=project="$JIRA_PROJECT_KEY" AND labels NOT IN ("claude-triaged-$REPO_NAME") AND status = "${{ inputs.ticket_status }}" ORDER BY created DESC' \
                --data-urlencode 'maxResults=${{ inputs.ticket_count }}' \
                --data-urlencode 'fields=key,summary,description,labels,status,comment'

            IMPORTANT: In JQL for the v3 API, use "status = \"Status Name\"" for exact match. Avoid the != operator as it causes escape sequence errors.

            ### Get issue details
              GET $JIRA_BASE_URL/rest/api/3/issue/{key}

            ### Get issue comments
              GET $JIRA_BASE_URL/rest/api/3/issue/{key}/comment

            ### Post a comment (v3 requires Atlassian Document Format)
            Comments in v3 use ADF (Atlassian Document Format). Use this jq helper to convert plain text to ADF:
              jq -n --arg text "YOUR COMMENT TEXT" '{
                "body": {
                  "type": "doc",
                  "version": 1,
                  "content": [{"type": "paragraph", "content": [{"type": "text", "text": $text}]}]
                }
              }'

            For bold text, use marks:
              {"type": "text", "text": "bold text", "marks": [{"type": "strong"}]}

            Example POST:
              COMMENT_JSON=$(jq -n --arg text "*[$REPO_NAME] Ambiguity detected:* description here" '{
                "body": {"type": "doc", "version": 1, "content": [{"type": "paragraph", "content": [{"type": "text", "text": $text}]}]}
              }')
              curl -s -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
                -H "Content-Type: application/json" \
                -X POST "$JIRA_BASE_URL/rest/api/3/issue/{key}/comment" \
                -d "$COMMENT_JSON"

            ### Update issue labels
              PUT $JIRA_BASE_URL/rest/api/3/issue/{key}
              Body: {"fields": {"labels": [... existing labels ..., "claude-triaged-$REPO_NAME"]}}

            ### Error handling
            If a Jira API call returns a 401 or 403, stop immediately and report the authentication failure. Do not retry auth errors.

            ## Step 0: Determine tickets to triage

            Repository name: "$REPO_NAME" (used for repo-scoped labels and comment headers)
            Triage label for this repo: "claude-triaged-$REPO_NAME"

            Ticket key input: "${{ inputs.ticket_key }}"
            Ticket count input: ${{ inputs.ticket_count }}

            If a specific ticket key is provided (non-empty string), use that single ticket.
            Otherwise, search for untriaged tickets using the v3 search/jql endpoint shown above.

            Parse the response with jq to extract ticket keys:
              echo "$RESPONSE" | jq -r '.issues[].key'

            If no tickets are found, output "No untriaged tickets found." and stop.

            ## Step 1: For each ticket, fetch full details and existing comments

            GET $JIRA_BASE_URL/rest/api/3/issue/{key}
            GET $JIRA_BASE_URL/rest/api/3/issue/{key}/comment

            Extract: summary, description, acceptance criteria (from description or custom fields), labels, status, linked issues, and all existing comments.

            ## Step 2: Run analytical triage

            Use the /lisa:ticket-triage skill to analyze the ticket. Pass the ticket key and provide the fetched ticket details (summary, description, acceptance criteria, comments) in context so the skill can perform its analysis.

            The skill will search the codebase, detect ambiguities, identify edge cases, plan verification methodology, and produce a structured verdict (BLOCKED, PASSED_WITH_FINDINGS, PASSED, or NOT_RELEVANT).

            ## Step 3: Post findings to Jira

            Take the skill's output and post it back to the ticket:

            For each section with findings (Ambiguities, Edge Cases, Verification Methodology), POST a comment using the ADF format shown above. Prefix all comments with "[$REPO_NAME]".

            ## Step 4: Label the ticket

            After all comments are posted, add the repo-scoped label "claude-triaged-$REPO_NAME":

            First GET current labels:
              GET $JIRA_BASE_URL/rest/api/3/issue/{key}?fields=labels

            Then PUT updated labels (append "claude-triaged-$REPO_NAME" to existing labels):
              PUT $JIRA_BASE_URL/rest/api/3/issue/{key}
              Body: {"fields": {"labels": [... existing labels ..., "claude-triaged-$REPO_NAME"]}}

            ## Step 5: Output summary

            After processing all tickets, output a summary:
            - Total tickets processed
            - For each ticket: key, summary, verdict, number of ambiguities found, number of edge cases found, whether verification methodology was added
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(*),Skill(*)"
            --max-turns ${{ steps.config.outputs.max_turns }}
            --system-prompt "You are a precise Jira ticket triage agent. Multiple repositories may triage the same Jira ticket. Read existing comments before posting to avoid duplication. Prefix all comments with [$REPO_NAME]. Only post findings relevant to the code in THIS repository. Focus on being specific and actionable. Every ambiguity must have a concrete clarifying question. Every edge case must reference code. Every verification method must be executable by an automated agent. Use jq for all JSON construction to ensure proper escaping. Do not modify any code in the repository -- you are read-only. Always use the Glob and Grep tools for codebase searching -- do not use find or grep via Bash."
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ vars.JIRA_USER_EMAIL }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
          REPO_NAME: ${{ github.event.repository.name }}
