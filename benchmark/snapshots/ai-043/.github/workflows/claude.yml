name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        # Pinned to v4 (Node20). A v5 bump here can't be CI-verified: the claude-review
        # action requires this workflow file to match main, so its check fails on any PR
        # that edits it (the action says to ignore that). dotfiles.yml is bumped to v5
        # (verified green); revisit these two once v5 is confirmed safe for the action.
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # Pin fable (Claude Fable 5) for implementation-grade @claude responses,
          # matching the review workflow; unpinned would silently track the CC
          # default model (Sonnet 5 as of v2.1.197).
          claude_args: '--model fable'
