name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          shopt -s globstar nullglob
          files=()
          for f in **/*.sh **/*.bash; do
            files+=("$f")
          done
          for f in ai-sandbox; do
            [[ -f "$f" ]] && files+=("$f")
          done
          if [[ ${#files[@]} -gt 0 ]]; then
            shellcheck --format=gcc "${files[@]}"
          fi

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Containerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: base/Containerfile

      - name: Lint claude-code/Containerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: claude-code/Containerfile

      - name: Lint codex/Containerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: codex/Containerfile

      - name: Lint cursor-agent/Containerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: cursor-agent/Containerfile

      - name: Lint opencode/Containerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: opencode/Containerfile
